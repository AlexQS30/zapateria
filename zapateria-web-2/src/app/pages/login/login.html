<div class="container" style="padding: 40px 20px; max-width: 400px; margin: 0 auto;">
    <h2>Inicia Sesión</h2>
    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Correo Electrónico</label>
            <input type="email" [(ngModel)]="credentials.email" name="email" class="form-control" required style="width: 100%; padding: 10px;">
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Contraseña</label>
            <input type="password" [(ngModel)]="credentials.password" name="password" class="form-control" required style="width: 100%; padding: 10px;">
        </div>
        <div *ngIf="errorMessage" style="color: red; margin-bottom: 15px;">{{ errorMessage }}</div>
        <button type="submit" class="btn btn-primary" [disabled]="!loginForm.valid">Inicia Sesión</button>
    </form>
</div>
