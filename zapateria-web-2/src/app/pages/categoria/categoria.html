<div class="container" style="padding: 40px 20px;">
    <h2>Colección: {{ categoryName }}</h2>
    <div class="products-grid">
        <div class="product-card" *ngFor="let product of products">
            <div class="product-image">
                <img [src]="product.image || 'https://images.unsplash.com/photo-1507222405253-b8ff5d6c0937?w=400&h=400&fit=crop'" [alt]="product.name" loading="lazy">
            </div>
            <div class="product-info">
                <h4 class="product-name">{{ product.name }}</h4>
                <p class="product-price">S/. {{ product.price.toFixed(2) }}</p>
                <a href="#" class="btn btn-outline">Ver detalle</a>
            </div>
        </div>
    </div>
</div>
