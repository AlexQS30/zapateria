<!-- EJEMPLO PRÁCTICO: Página completa de Login para zapateria-web -->
<!-- Guardar como: templates/login-complete-example.html -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FootStyle Zapatería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
        }
        
        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .login-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }
        
        .login-header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
        
        .login-form {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f9f9ff;
        }
        
        .form-group input.is-invalid {
            border-color: #dc3545;
            background-color: #fff5f5;
        }
        
        .form-group input.is-valid {
            border-color: #28a745;
            background-color: #f5fff5;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            color: #28a745;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 10px;
            position: relative;
            color: #999;
            font-size: 14px;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .register-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <h1>👟 FootStyle</h1>
            <p>Zapatería Online</p>
        </div>
        
        <!-- Form -->
        <div class="login-form">
            <!-- Alert Messages -->
            <div id="alertMessage" class="alert"></div>
            
            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">📧 Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com"
                        required
                        autocomplete="email"
                    >
                    <div class="error-message" id="emailError"></div>
                    <div class="success-message" id="emailSuccess"></div>
                </div>

                <div class="form-group">
                    <label for="password">🔑 Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Mínimo 6 caracteres"
                        required
                        minlength="6"
                        autocomplete="current-password"
                    >
                    <div class="error-message" id="passwordError"></div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Iniciar Sesión
                </button>
                
                <div class="loading-spinner" id="loadingSpinner"></div>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>¿No tienes cuenta?</span>
            </div>

            <!-- Register Link -->
            <div class="register-link">
                <a href="/register">Crear cuenta nueva</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/auth-integration.js"></script>
    <script>
        // Elementos del formulario
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const alertDiv = document.getElementById('alertMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');

        /**
         * Valida email en tiempo real (opcional)
         */
        emailInput.addEventListener('blur', async function() {
            if (!this.value) return;
            
            if (!this.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                this.classList.add('is-invalid');
                document.getElementById('emailError').textContent = 'Email inválido';
                document.getElementById('emailError').classList.add('show');
                return;
            }

            const exists = await checkEmailExists(this.value);
            if (exists) {
                this.classList.add('is-valid');
                document.getElementById('emailSuccess').textContent = 'Email encontrado ✓';
                document.getElementById('emailSuccess').classList.add('show');
                document.getElementById('emailError').classList.remove('show');
                this.classList.remove('is-invalid');
            } else {
                this.classList.add('is-invalid');
                document.getElementById('emailError').textContent = 'Usuario no encontrado';
                document.getElementById('emailError').classList.add('show');
                document.getElementById('emailSuccess').classList.remove('show');
            }
        });

        /**
         * Maneja el envío del formulario
         */
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validar campos
            if (!emailInput.value || !passwordInput.value) {
                showAlert('Por favor completa todos los campos', 'danger');
                return;
            }

            // Mostrar spinner y deshabilitar botón
            loadingSpinner.style.display = 'block';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Autenticando...';

            try {
                // Llamar al servicio de login
                const result = await loginUser(emailInput.value, passwordInput.value);

                if (result.success) {
                    showAlert(`¡Bienvenido ${result.user.firstName}!`, 'success');
                    
                    // Redirigir después de 2 segundos
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showAlert(`Error: ${result.message}`, 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error de conexión con el servidor', 'danger');
            } finally {
                // Restaurar estado del botón
                loadingSpinner.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Iniciar Sesión';
            }
        });

        /**
         * Muestra mensajes de alerta
         */
        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;

            // Auto-ocultar después de 5 segundos
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        /**
         * Limpiar validaciones al escribir
         */
        emailInput.addEventListener('input', function() {
            this.classList.remove('is-invalid', 'is-valid');
            document.getElementById('emailError').classList.remove('show');
            document.getElementById('emailSuccess').classList.remove('show');
        });

        passwordInput.addEventListener('input', function() {
            document.getElementById('passwordError').classList.remove('show');
        });

        /**
         * Redirigir si ya está autenticado
         */
        document.addEventListener('DOMContentLoaded', function() {
            if (isUserLoggedIn()) {
                // Ya está autenticado, redirigir a inicio
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
