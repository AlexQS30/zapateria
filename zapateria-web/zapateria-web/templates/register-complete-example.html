<!-- EJEMPLO PRÁCTICO: Página completa de Registro para zapateria-web -->
<!-- Guardar como: templates/register-complete-example.html -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - FootStyle Zapatería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding: 20px 0;
        }
        
        .register-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .register-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }
        
        .register-header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
        
        .register-form {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .register-form::-webkit-scrollbar {
            width: 6px;
        }
        
        .register-form::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .register-form::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        
        .form-section {
            margin-bottom: 20px;
        }
        
        .form-section-title {
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 13px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f9f9ff;
        }
        
        .form-group input.is-invalid {
            border-color: #dc3545;
            background-color: #fff5f5;
        }
        
        .form-group input.is-valid {
            border-color: #28a745;
            background-color: #f5fff5;
        }
        
        .form-group.form-group-half {
            width: calc(50% - 7.5px);
            float: left;
        }
        
        .form-group.form-group-half:nth-child(odd) {
            margin-right: 15px;
        }
        
        .form-group.form-group-half:nth-child(even) {
            margin-left: 0;
        }
        
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 11px;
            margin-top: 4px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .help-text {
            color: #999;
            font-size: 11px;
            margin-top: 4px;
        }
        
        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-register:active {
            transform: translateY(0);
        }
        
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .login-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .form-group input[type="email"]:valid:not(:placeholder-shown) {
            border-color: #28a745;
        }
        
        .form-group input[type="password"]:valid:not(:placeholder-shown) {
            border-color: #28a745;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- Header -->
        <div class="register-header">
            <h1>👟 FootStyle</h1>
            <p>Crear Nueva Cuenta</p>
        </div>
        
        <!-- Form -->
        <div class="register-form">
            <!-- Alert Messages -->
            <div id="alertMessage" class="alert"></div>
            
            <!-- Register Form -->
            <form id="registerForm">
                <!-- SECCIÓN 1: Credenciales -->
                <div class="form-section">
                    <div class="form-section-title">Credenciales</div>
                    
                    <div class="form-group">
                        <label for="email">📧 Email *</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="tu@email.com"
                            required
                            autocomplete="email"
                        >
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">🔑 Contraseña *</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Mínimo 6 caracteres"
                            required
                            minlength="6"
                            autocomplete="new-password"
                        >
                        <div class="help-text">Usa mayúsculas, números y símbolos para mayor seguridad</div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">🔑 Confirmar Contraseña *</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Repite tu contraseña"
                            required
                            minlength="6"
                            autocomplete="new-password"
                        >
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>
                </div>

                <!-- SECCIÓN 2: Información Personal -->
                <div class="form-section">
                    <div class="form-section-title">Información Personal</div>
                    
                    <div class="form-group form-group-half clearfix">
                        <label for="firstName">Nombre *</label>
                        <input 
                            type="text" 
                            id="firstName" 
                            name="firstName" 
                            placeholder="Juan"
                            required
                            autocomplete="given-name"
                        >
                        <div class="error-message" id="firstNameError"></div>
                    </div>

                    <div class="form-group form-group-half">
                        <label for="lastName">Apellido *</label>
                        <input 
                            type="text" 
                            id="lastName" 
                            name="lastName" 
                            placeholder="Pérez"
                            required
                            autocomplete="family-name"
                        >
                        <div class="error-message" id="lastNameError"></div>
                    </div>

                    <div style="clear: both;"></div>

                    <div class="form-group">
                        <label for="phoneNumber">📞 Teléfono</label>
                        <input 
                            type="tel" 
                            id="phoneNumber" 
                            name="phoneNumber" 
                            placeholder="987654321"
                            autocomplete="tel"
                        >
                    </div>
                </div>

                <!-- SECCIÓN 3: Dirección -->
                <div class="form-section">
                    <div class="form-section-title">Dirección</div>
                    
                    <div class="form-group">
                        <label for="address">Dirección</label>
                        <input 
                            type="text" 
                            id="address" 
                            name="address" 
                            placeholder="Calle Principal 123"
                            autocomplete="street-address"
                        >
                    </div>

                    <div class="form-group form-group-half clearfix">
                        <label for="city">Ciudad</label>
                        <input 
                            type="text" 
                            id="city" 
                            name="city" 
                            placeholder="Lima"
                            autocomplete="address-level2"
                        >
                    </div>

                    <div class="form-group form-group-half">
                        <label for="postalCode">Código Postal</label>
                        <input 
                            type="text" 
                            id="postalCode" 
                            name="postalCode" 
                            placeholder="01001"
                            autocomplete="postal-code"
                        >
                    </div>

                    <div style="clear: both;"></div>
                </div>

                <!-- BOTÓN REGISTRAR -->
                <button type="submit" class="btn-register" id="registerBtn">
                    Crear Cuenta
                </button>
                
                <div class="loading-spinner" id="loadingSpinner"></div>
            </form>

            <!-- Divider -->
            <div class="divider">
                <small style="color: #999;">¿Ya tienes cuenta?</small>
            </div>

            <!-- Login Link -->
            <div class="login-link">
                <a href="/login">Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/auth-integration.js"></script>
    <script>
        // Elementos del formulario
        const registerForm = document.getElementById('registerForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const registerBtn = document.getElementById('registerBtn');
        const alertDiv = document.getElementById('alertMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');

        /**
         * Valida email en tiempo real
         */
        emailInput.addEventListener('blur', async function() {
            const emailError = document.getElementById('emailError');
            
            if (!this.value) {
                emailError.classList.remove('show');
                return;
            }

            if (!this.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                this.classList.add('is-invalid');
                emailError.textContent = 'Email inválido';
                emailError.classList.add('show');
                return;
            }

            const exists = await checkEmailExists(this.value);
            if (exists) {
                this.classList.add('is-invalid');
                emailError.textContent = 'Este email ya está registrado';
                emailError.classList.add('show');
            } else {
                this.classList.add('is-valid');
                emailError.classList.remove('show');
            }
        });

        /**
         * Valida coincidencia de contraseñas
         */
        confirmPasswordInput.addEventListener('input', function() {
            const confirmPasswordError = document.getElementById('confirmPasswordError');
            
            if (this.value && passwordInput.value !== this.value) {
                this.classList.add('is-invalid');
                confirmPasswordError.textContent = 'Las contraseñas no coinciden';
                confirmPasswordError.classList.add('show');
            } else if (this.value && passwordInput.value === this.value) {
                this.classList.add('is-valid');
                confirmPasswordError.classList.remove('show');
            }
        });

        /**
         * Valida campos requeridos
         */
        registerForm.addEventListener('input', function() {
            const allValid = 
                emailInput.value && 
                passwordInput.value && 
                confirmPasswordInput.value &&
                firstNameInput.value &&
                lastNameInput.value &&
                passwordInput.value === confirmPasswordInput.value;

            registerBtn.disabled = !allValid;
        });

        /**
         * Maneja el envío del formulario
         */
        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validaciones
            let isValid = true;
            
            if (!emailInput.value) {
                showFieldError('email', 'El email es requerido');
                isValid = false;
            }
            if (!passwordInput.value) {
                showFieldError('password', 'La contraseña es requerida');
                isValid = false;
            }
            if (passwordInput.value !== confirmPasswordInput.value) {
                showFieldError('confirmPassword', 'Las contraseñas no coinciden');
                isValid = false;
            }
            if (!firstNameInput.value) {
                showFieldError('firstName', 'El nombre es requerido');
                isValid = false;
            }
            if (!lastNameInput.value) {
                showFieldError('lastName', 'El apellido es requerido');
                isValid = false;
            }

            if (!isValid) return;

            // Mostrar spinner y deshabilitar botón
            loadingSpinner.style.display = 'block';
            registerBtn.disabled = true;
            registerBtn.textContent = 'Registrando...';

            try {
                // Preparar datos del usuario
                const userData = {
                    email: emailInput.value,
                    password: passwordInput.value,
                    firstName: firstNameInput.value,
                    lastName: lastNameInput.value,
                    phoneNumber: document.getElementById('phoneNumber').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    postalCode: document.getElementById('postalCode').value
                };

                // Llamar al servicio de registro
                const result = await registerUser(userData);

                if (result.success) {
                    showAlert(`¡Registro exitoso! Bienvenido ${result.user.firstName}`, 'success');
                    
                    // Limpiar formulario
                    registerForm.reset();
                    
                    // Redirigir después de 2 segundos
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showAlert(`Error: ${result.message}`, 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error de conexión con el servidor', 'danger');
            } finally {
                // Restaurar estado del botón
                loadingSpinner.style.display = 'none';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Crear Cuenta';
            }
        });

        /**
         * Muestra errores en campos específicos
         */
        function showFieldError(fieldName, message) {
            const errorElement = document.getElementById(fieldName + 'Error');
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }
        }

        /**
         * Muestra mensajes de alerta
         */
        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;

            // Auto-ocultar después de 5 segundos
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        /**
         * Limpiar validaciones al escribir
         */
        [emailInput, passwordInput, confirmPasswordInput, firstNameInput, lastNameInput].forEach(input => {
            input.addEventListener('input', function() {
                const errorId = this.id + 'Error';
                const errorElement = document.getElementById(errorId);
                if (errorElement) {
                    errorElement.classList.remove('show');
                }
            });
        });

        /**
         * Redirigir si ya está autenticado
         */
        document.addEventListener('DOMContentLoaded', function() {
            if (isUserLoggedIn()) {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
