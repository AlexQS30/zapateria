<!-- Ejemplo de formulario de Login para zapateria-web -->
<!-- Guardar como: src/main/resources/templates/login-form.html (ejemplo) -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zapatería</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Iniciar Sesión</h2>

                        <!-- Formulario de Login -->
                        <form id="loginForm" onsubmit="handleLoginSubmit(event)">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" 
                                       name="email" required placeholder="tu@email.com">
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" 
                                       name="password" required placeholder="Contraseña" minlength="6">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Iniciar Sesión
                            </button>
                        </form>

                        <hr class="my-4">

                        <p class="text-center">
                            ¿No tienes cuenta? 
                            <a href="/register">Regístrate aquí</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script para auth -->
    <script src="/js/auth-integration.js"></script>
</body>
</html>
