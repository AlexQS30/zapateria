<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Categoría - FootStyle</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header y Navegación -->
    <div th:replace="fragments/header :: header"></div>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <div class="container">
            <a href="/">Inicio</a>
            <span>/</span>
            <span th:text="${categoria}">Categoría</span>
        </div>
    </div>

    <!-- Contenido de Categoría -->
    <section class="category-section">
        <div class="container">
            <div class="category-header">
                <h1 th:if="${categoria == 'hombre'}">Calzados para Hombre</h1>
                <h1 th:if="${categoria == 'mujer'}">Calzados para Mujer</h1>
                <h1 th:if="${categoria == 'ninos'}">Calzados para Niños</h1>
                <h1 th:if="${categoria == 'accesorios'}">Accesorios</h1>
                <p>Descubre nuestra colección completa</p>
            </div>

            <div class="category-content">
                <!-- Sidebar Filtros -->
                <aside class="sidebar">
                    <div class="filter-section">
                        <h3>Filtros</h3>
                        
                        <div class="filter-group">
                            <h4>Precio</h4>
                            <input type="range" min="0" max="500" value="250">
                            <p>S/ 0 - S/ 500</p>
                        </div>

                        <div class="filter-group">
                            <h4>Tamaño</h4>
                            <label><input type="checkbox"> 35</label>
                            <label><input type="checkbox"> 36</label>
                            <label><input type="checkbox"> 37</label>
                            <label><input type="checkbox"> 38</label>
                            <label><input type="checkbox"> 39</label>
                            <label><input type="checkbox"> 40</label>
                            <label><input type="checkbox"> 41</label>
                            <label><input type="checkbox"> 42</label>
                        </div>

                        <div class="filter-group">
                            <h4>Color</h4>
                            <label><input type="checkbox"> Negro</label>
                            <label><input type="checkbox"> Blanco</label>
                            <label><input type="checkbox"> Azul</label>
                            <label><input type="checkbox"> Rojo</label>
                            <label><input type="checkbox"> Marrón</label>
                        </div>

                        <div class="filter-group">
                            <h4>Material</h4>
                            <label><input type="checkbox"> Cuero</label>
                            <label><input type="checkbox"> Tela</label>
                            <label><input type="checkbox"> Sintético</label>
                        </div>

                        <button class="btn btn-primary" style="width: 100%; margin-top: 20px;">Aplicar Filtros</button>
                    </div>
                </aside>

                <!-- Productos -->
                <main class="products-section">
                    <div class="products-header">
                        <div class="view-options">
                            <button class="view-toggle active"><i class="fas fa-grip"></i></button>
                            <button class="view-toggle"><i class="fas fa-list"></i></button>
                        </div>
                        <div class="sort-options">
                            <select>
                                <option>Ordenar por</option>
                                <option>Más Popular</option>
                                <option>Menor Precio</option>
                                <option>Mayor Precio</option>
                                <option>Más Nuevo</option>
                            </select>
                        </div>
                    </div>

                    <div class="products-grid">
                        <!-- Los productos se cargarán dinámicamente desde el API del backend -->
                    </div>
                </main>
            </div>
        </div>
    </section>

    <!-- Paginación -->
    <div class="pagination">
        <div class="container">
            <button disabled>&laquo;</button>
            <button class="active">1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>&raquo;</button>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="fragments/footer :: footer"></div>

    <!-- WhatsApp Flotante -->
    <a href="https://wa.me/51949259138" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Modal Login -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Inicia Sesión</h2>
                <button class="modal-close" onclick="closeLoginModal()">&times;</button>
            </div>
            <form id="modalLoginForm" class="modal-form">
                <div class="form-group-modal">
                    <label for="modalEmail">Correo Electrónico</label>
                    <input type="email" id="modalEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group-modal">
                    <label for="modalPassword">Contraseña</label>
                    <input type="password" id="modalPassword" placeholder="••••••••" required>
                </div>
                <div class="form-options-modal">
                    <label>
                        <input type="checkbox" name="remember"> Recuérdame
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" id="modalLoginBtn" class="btn-login-modal">Inicia Sesión</button>
            </form>
            <div class="modal-divider">O continúa con</div>
            <div style="display: flex; gap: 10px;">
                <button style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; color: #666; font-size: 13px; transition: all 0.3s;" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='white'">
                    <i class="fab fa-google"></i> Google
                </button>
                <button style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; color: #666; font-size: 13px; transition: all 0.3s;" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='white'">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>
            <div class="modal-signup">
                ¿No tienes cuenta? <a href="#">Regístrate</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/script.js}"></script>
    <script th:src="@{/js/auth-integration.js}"></script>
    <script th:src="@{/js/modal.js}"></script>
    <script th:src="@{/js/categoria.js}"></script>
</body>
</html>
