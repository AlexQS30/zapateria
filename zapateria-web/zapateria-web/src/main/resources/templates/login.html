<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia Sesión - FootStyle</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body class="auth-page auth-page-login">
    <div class="login-wrapper">
        <!-- Lado Izquierdo -->
        <div class="login-left">
            <div>
                <div style="font-size: 60px; margin-bottom: 20px;">👟</div>
                <h2>FootStyle</h2>
                <p>Descubre los mejores zapatos</p>
                <ul class="login-features">
                    <li><i class="fas fa-check-circle"></i> Envío gratis desde S/ 100</li>
                    <li><i class="fas fa-check-circle"></i> Productos 100% originales</li>
                    <li><i class="fas fa-check-circle"></i> Garantía de satisfacción</li>
                    <li><i class="fas fa-check-circle"></i> Ofertas exclusivas</li>
                </ul>
            </div>
        </div>

        <!-- Lado Derecho -->
        <div class="login-right">
            <h1><i class="fas fa-sign-in-alt"></i> Inicia Sesión</h1>
            <p>Accede a tu cuenta para continuar</p>

            <div th:if="${error}" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" name="remember">
                        Recuérdame
                    </label>
                    <a href="#" onclick="alert('Función en desarrollo')">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Inicia Sesión
                </button>
            </form>

            <div class="divider">
                <span></span>
                <span class="divider-text">O continúa con</span>
                <span></span>
            </div>

            <div class="social-buttons">
                <button class="social-btn" onclick="alert('Google Login - En desarrollo')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn" onclick="alert('Facebook Login - En desarrollo')">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>

            <p class="signup-text">
                ¿No tienes cuenta? <a href="/register">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <!-- Script de autenticación -->
    <script src="/js/auth-integration.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validar campos
            if (!emailInput.value || !passwordInput.value) {
                alert('Por favor completa todos los campos');
                return;
            }

            // Cambiar texto del botón
            loginBtn.textContent = 'Autenticando...';
            loginBtn.disabled = true;

            try {
                // Llamar al servicio de login
                const result = await loginUser(emailInput.value, passwordInput.value);

                if (result.success) {
                    // Login exitoso
                    alert(`¡Bienvenido ${result.user.firstName}!`);
                    // Redirigir según el rol del usuario
                    redirectByRole();
                } else {
                    // Error en login
                    alert(`Error: ${result.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión con el servidor');
            } finally {
                // Restaurar estado del botón
                loginBtn.textContent = '✓ Inicia Sesión';
                loginBtn.disabled = false;
            }
        });

        // Redirigir si ya está autenticado
        window.addEventListener('DOMContentLoaded', function() {
            if (isUserLoggedIn()) {
                redirectByRole();
            }
        });
    </script>
</body>
</html>
