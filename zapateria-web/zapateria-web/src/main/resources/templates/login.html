<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia Sesión - FootStyle</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 80px;
            text-align: center;
        }

        .login-left h2 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .login-left p {
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
            opacity: 0.95;
        }

        .login-features {
            list-style: none;
            text-align: left;
        }

        .login-features li {
            margin: 15px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .login-features i {
            font-size: 20px;
            min-width: 30px;
        }

        .login-right {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h1 {
            color: #1a1a1a;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-right p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin: 0;
            font-weight: 500;
        }

        .form-options a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .form-options a:hover {
            color: #764ba2;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 25px 0;
            color: #ccc;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider-text {
            color: #999;
            font-size: 13px;
            white-space: nowrap;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f5f7ff;
            color: #667eea;
        }

        .signup-text {
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .signup-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .signup-text a:hover {
            color: #764ba2;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #c33;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }

            .login-left {
                padding: 40px 30px;
                min-height: 280px;
            }

            .login-left h2 {
                font-size: 24px;
            }

            .login-left p {
                font-size: 14px;
            }

            .login-right {
                padding: 40px 30px;
            }

            .login-right h1 {
                font-size: 24px;
            }

            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Lado Izquierdo -->
        <div class="login-left">
            <div>
                <div style="font-size: 60px; margin-bottom: 20px;">👟</div>
                <h2>FootStyle</h2>
                <p>Descubre los mejores zapatos</p>
                <ul class="login-features">
                    <li><i class="fas fa-check-circle"></i> Envío gratis desde S/ 100</li>
                    <li><i class="fas fa-check-circle"></i> Productos 100% originales</li>
                    <li><i class="fas fa-check-circle"></i> Garantía de satisfacción</li>
                    <li><i class="fas fa-check-circle"></i> Ofertas exclusivas</li>
                </ul>
            </div>
        </div>

        <!-- Lado Derecho -->
        <div class="login-right">
            <h1><i class="fas fa-sign-in-alt"></i> Inicia Sesión</h1>
            <p>Accede a tu cuenta para continuar</p>

            <div th:if="${error}" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" name="remember">
                        Recuérdame
                    </label>
                    <a href="#" onclick="alert('Función en desarrollo')">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Inicia Sesión
                </button>
            </form>

            <div class="divider">
                <span></span>
                <span class="divider-text">O continúa con</span>
                <span></span>
            </div>

            <div class="social-buttons">
                <button class="social-btn" onclick="alert('Google Login - En desarrollo')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn" onclick="alert('Facebook Login - En desarrollo')">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>

            <p class="signup-text">
                ¿No tienes cuenta? <a href="/register">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <!-- Script de autenticación -->
    <script src="/js/auth-integration.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validar campos
            if (!emailInput.value || !passwordInput.value) {
                alert('Por favor completa todos los campos');
                return;
            }

            // Cambiar texto del botón
            loginBtn.textContent = 'Autenticando...';
            loginBtn.disabled = true;

            try {
                // Llamar al servicio de login
                const result = await loginUser(emailInput.value, passwordInput.value);

                if (result.success) {
                    // Login exitoso
                    alert(`¡Bienvenido ${result.user.firstName}!`);
                    // Redirigir según el rol del usuario
                    redirectByRole();
                } else {
                    // Error en login
                    alert(`Error: ${result.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión con el servidor');
            } finally {
                // Restaurar estado del botón
                loginBtn.textContent = '✓ Inicia Sesión';
                loginBtn.disabled = false;
            }
        });

        // Redirigir si ya está autenticado
        window.addEventListener('DOMContentLoaded', function() {
            if (isUserLoggedIn()) {
                redirectByRole();
            }
        });
    </script>
</body>
</html>
