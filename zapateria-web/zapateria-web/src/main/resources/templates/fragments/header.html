<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <header th:fragment="header">
        <!-- Top Bar -->
    <script>
        (function () {
            function updateAuthMenu() {
                const guestMenu = document.getElementById('auth-guest-menu');
                const userMenu = document.getElementById('auth-user-menu');
                const userName = document.getElementById('auth-user-name');
                const rawUser = sessionStorage.getItem('user');
                const isLoggedIn = sessionStorage.getItem('loggedIn') === 'true';

                if (!guestMenu || !userMenu) {
                    return;
                }

                if (rawUser && isLoggedIn) {
                    const user = JSON.parse(rawUser);
                    guestMenu.style.display = 'none';
                    userMenu.style.display = 'flex';
                    if (userName) {
                        userName.textContent = user.firstName || user.email || 'Usuario';
                    }
                    return;
                }

                guestMenu.style.display = 'flex';
                userMenu.style.display = 'none';
            }

            document.addEventListener('DOMContentLoaded', updateAuthMenu);
            window.addEventListener('storage', updateAuthMenu);
            window.renderAuthHeader = updateAuthMenu;
        })();
    </script>
        <div class="top-bar">
            <div class="container">
                <div class="top-bar-left">
                    <span><i class="fas fa-phone"></i> +51 949 259 138</span>
                    <span><i class="fas fa-envelope"></i> info@footstyle.com</span>
                </div>
                <div class="top-bar-right">
                    <a href="/contacto"><i class="fas fa-question-circle"></i> Ayuda</a>
                    <div class="user-menu" id="auth-guest-menu">
                        <a href="javascript:void(0)" onclick="openLoginModal()"><i class="fas fa-sign-in-alt"></i> Inicia Sesión</a>
                    </div>
                    <div class="user-menu" id="auth-user-menu" style="display:none;">
                        <div class="user-dropdown">
                            <button class="user-btn" type="button">
                                <i class="fas fa-user-circle"></i> <span id="auth-user-name"></span>
                            </button>
                            <div class="dropdown-content">
                                <a href="#"><i class="fas fa-cog"></i> Mi Perfil</a>
                                <a href="/mis-pedidos"><i class="fas fa-box"></i> Mis Pedidos</a>
                                <a href="#"><i class="fas fa-heart"></i> Favoritos</a>
                                <a href="#"><i class="fas fa-cog"></i> Configuración</a>
                                <hr>
                                <a href="javascript:void(0)" onclick="window.logout && window.logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Header -->
        <nav class="navbar">
            <div class="container navbar-content">
                <div class="navbar-brand">
                    <a href="/">
                        <h1>FootStyle</h1>
                    </a>
                </div>

                <div class="navbar-search">
                    <input type="text" placeholder="Buscar productos...">
                    <button><i class="fas fa-search"></i></button>
                </div>

                <div class="navbar-actions">
                    <div class="action-item">
                        <i class="fas fa-heart"></i>
                        <span class="badge">0</span>
                    </div>
                    <div class="action-item cart">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="badge">0</span>
                    </div>
                </div>
            </div>

            <!-- Menu Principal -->
            <div class="menu-bar">
                <div class="container">
                    <ul class="menu" id="category-menu">
                        <li><a href="/hombre">HOMBRE</a></li>
                        <li><a href="/mujer">MUJER</a></li>
                        <li><a href="/ninos">NIÑOS</a></li>
                        <li><a href="/deportivos">DEPORTIVOS</a></li>
                        <li><a href="/formales">FORMALES</a></li>
                        <li><a href="/accesorios">ACCESORIOS</a></li>
                        <li><a href="/#ofertas">OFERTAS</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <script th:src="@{/js/menu.js}"></script>
    <script th:src="@{/js/cart.js}"></script>
